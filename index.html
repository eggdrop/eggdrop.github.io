<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg Drop</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐔</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🐔 Egg Drop</h1>
        </header>

        <main>
            <!-- Log New Eggs Section -->
            <section class="log-section">
                <form class="egg-form" method="POST">

                    <div class="form-group">
                        <div class="color-grid">
                            <!-- Light Brown -->
                            <div class="color-option light-brown" data-color="light-brown">
                                <div class="color-name">Light Brown</div>
                                <div class="quantity-boxes">
                                    <input type="radio" name="light-brown-qty" value="1" id="lb-qty-1">
                                    <label for="lb-qty-1">1</label>
                                    <input type="radio" name="light-brown-qty" value="2" id="lb-qty-2">
                                    <label for="lb-qty-2">2</label>
                                    <input type="radio" name="light-brown-qty" value="3" id="lb-qty-3">
                                    <label for="lb-qty-3">3</label>
                                    <input type="radio" name="light-brown-qty" value="4" id="lb-qty-4">
                                    <label for="lb-qty-4">4</label>
                                    <input type="radio" name="light-brown-qty" value="5" id="lb-qty-5">
                                    <label for="lb-qty-5">5</label>
                                </div>
                                <div class="egg-issues" style="display: none;">
                                    <div class="issue-label">Mark any issues:</div>
                                    <div class="egg-items" id="lb-eggs"></div>
                                </div>
                            </div>

                            <!-- Dark Brown -->
                            <div class="color-option dark-brown" data-color="dark-brown">
                                <div class="color-name">Dark Brown</div>
                                <div class="quantity-boxes">
                                    <input type="radio" name="dark-brown-qty" value="1" id="db-qty-1">
                                    <label for="db-qty-1">1</label>
                                    <input type="radio" name="dark-brown-qty" value="2" id="db-qty-2">
                                    <label for="db-qty-2">2</label>
                                    <input type="radio" name="dark-brown-qty" value="3" id="db-qty-3">
                                    <label for="db-qty-3">3</label>
                                    <input type="radio" name="dark-brown-qty" value="4" id="db-qty-4">
                                    <label for="db-qty-4">4</label>
                                    <input type="radio" name="dark-brown-qty" value="5" id="db-qty-5">
                                    <label for="db-qty-5">5</label>
                                </div>
                                <div class="egg-issues" style="display: none;">
                                    <div class="issue-label">Mark any issues:</div>
                                    <div class="egg-items" id="db-eggs"></div>
                                </div>
                            </div>

                            <!-- Green -->
                            <div class="color-option green" data-color="green">
                                <div class="color-name">Green</div>
                                <div class="quantity-boxes">
                                    <input type="radio" name="green-qty" value="1" id="g-qty-1">
                                    <label for="g-qty-1">1</label>
                                    <input type="radio" name="green-qty" value="2" id="g-qty-2">
                                    <label for="g-qty-2">2</label>
                                    <input type="radio" name="green-qty" value="3" id="g-qty-3">
                                    <label for="g-qty-3">3</label>
                                    <input type="radio" name="green-qty" value="4" id="g-qty-4">
                                    <label for="g-qty-4">4</label>
                                    <input type="radio" name="green-qty" value="5" id="g-qty-5">
                                    <label for="g-qty-5">5</label>
                                </div>
                                <div class="egg-issues" style="display: none;">
                                    <div class="issue-label">Mark any issues:</div>
                                    <div class="egg-items" id="g-eggs"></div>
                                </div>
                            </div>

                            <!-- Blue -->
                            <div class="color-option blue" data-color="blue">
                                <div class="color-name">Blue</div>
                                <div class="quantity-boxes">
                                    <input type="radio" name="blue-qty" value="1" id="b-qty-1">
                                    <label for="b-qty-1">1</label>
                                    <input type="radio" name="blue-qty" value="2" id="b-qty-2">
                                    <label for="b-qty-2">2</label>
                                    <input type="radio" name="blue-qty" value="3" id="b-qty-3">
                                    <label for="b-qty-3">3</label>
                                    <input type="radio" name="blue-qty" value="4" id="b-qty-4">
                                    <label for="b-qty-4">4</label>
                                    <input type="radio" name="blue-qty" value="5" id="b-qty-5">
                                    <label for="b-qty-5">5</label>
                                </div>
                                <div class="egg-issues" style="display: none;">
                                    <div class="issue-label">Mark any issues:</div>
                                    <div class="egg-items" id="b-eggs"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="notes">Notes:</label>
                        <textarea id="notes" name="notes" rows="2" placeholder="Any additional notes..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary">Record Eggs</button>
                </form>
            </section>
        </main>
    </div>

    <script>
        document.querySelectorAll('.color-option').forEach(colorOption => {
            const color = colorOption.dataset.color;
            const quantityInputs = colorOption.querySelectorAll('input[type="radio"]');
            const eggIssuesSection = colorOption.querySelector('.egg-issues');
            const eggItemsContainer = colorOption.querySelector('.egg-items');

            quantityInputs.forEach(input => {
                input.addEventListener('change', function() {
                    const quantity = parseInt(this.value);
                    renderEggs(quantity, color);
                    eggIssuesSection.style.display = 'block';
                });
            });

            function renderEggs(quantity, color) {
                eggItemsContainer.innerHTML = '';
                
                for (let i = 1; i <= quantity; i++) {
                    const eggItem = document.createElement('div');
                    eggItem.className = 'egg-item';
                    eggItem.dataset.eggNum = i;
                    
                    const eggNumber = document.createElement('div');
                    eggNumber.className = 'egg-number';
                    eggNumber.textContent = i;
                    eggNumber.addEventListener('click', function() {
                        this.classList.toggle('selected');
                    });
                    
                    const issuesRow = document.createElement('div');
                    issuesRow.className = 'egg-issues-row';
                    
                    const crackedToggle = document.createElement('div');
                    crackedToggle.className = 'egg-issue-toggle';
                    crackedToggle.textContent = 'CS';
                    crackedToggle.title = 'Cracked';
                    crackedToggle.dataset.issue = 'crack';
                    crackedToggle.addEventListener('click', function(e) {
                        e.stopPropagation();
                        this.classList.toggle('active');
                    });
                    
                    const softToggle = document.createElement('div');
                    softToggle.className = 'egg-issue-toggle';
                    softToggle.textContent = 'SS';
                    softToggle.title = 'Soft Shell';
                    softToggle.dataset.issue = 'soft';
                    softToggle.addEventListener('click', function(e) {
                        e.stopPropagation();
                        this.classList.toggle('active');
                    });
                    
                    issuesRow.appendChild(crackedToggle);
                    issuesRow.appendChild(softToggle);
                    
                    eggItem.appendChild(eggNumber);
                    eggItem.appendChild(issuesRow);
                    eggItemsContainer.appendChild(eggItem);
                }
            }
        });
    </script>
